name: Streamlit Strict Wakeup

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:      # Manual trigger

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required for the empty commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Selenium
        run: pip install selenium webdriver-manager
        
      - name: Run Wake Script
        env:
          STREAMLIT_URL: ${{ secrets.STREAMLIT_URL }}
        run: python wake_app.py
        
      - name: Push Heartbeat Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keep-alive heart-beat: $(date)"
          git push origin main --force
